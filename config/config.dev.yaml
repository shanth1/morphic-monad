system:
  env: 'dev'
logger:
  app: 'morphic-monad'
  level: 'debug'
  service: 'distributed'
transport:
  nats:
    url: 'nats://nats:4222'
    stream_name: 'PLATFORM_EVENTS'
modules:
  gateway:
    port: '8080'
    read_timeout: '15s'
    write_timeout: '15s'
  router:
    strategy: 'static'
  tools:
    blob_store:
      provider: 's3'
      s3:
        endpoint: 'http://s3:9090'
        bucket: 'platform-documents'
        use_path_style: true
        access_key: 'test'
        secret_key: 'test'
        region: 'us-east-1'
    embedder:
      provider: 'ollama'
      ollama:
        base_url: 'http://host.docker.internal:11434'
        model: 'nomic-embed-text'
    vision:
      provider: 'ollama'
      ollama:
        base_url: 'http://host.docker.internal:11434'
        model: 'llava'
