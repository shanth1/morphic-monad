services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    hostname: nats

  gateway:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.microservice
      args:
        SERVICE_NAME: gateway
    environment:
      - APP_ENV=local
      - NATS_URL=nats://nats:4222
      - LOGGER_APP=morphic
      - LOGGER_SERVICE=gateway
      - LOGGER_LEVEL=debug
    depends_on:
      - nats

  router:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.microservice
      args:
        SERVICE_NAME: router
    environment:
      - APP_ENV=local
      - NATS_URL=nats://nats:4222
      - LOGGER_APP=morphic
      - LOGGER_SERVICE=router
      - LOGGER_LEVEL=debug
    depends_on:
      - nats
