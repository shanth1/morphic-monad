services:
  nats:
    image: nats:alpine
    command: '-js -m 8222 -sd /data'
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats-data:/data
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8222/varz']
      interval: 2s
      timeout: 2s
      retries: 15

  s3:
    image: adobe/s3mock:latest
    ports:
      - '9090:9090'
    environment:
      - initialBuckets=platform-documents
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9090/']
      interval: 2s
      timeout: 2s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  nats-data:
  qdrant-data:
