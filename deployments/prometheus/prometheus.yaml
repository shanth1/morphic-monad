global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'morphic_monad'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'host.docker.internal:8080'
          - 'gateway:8080'
          - 'router:8081'
          - 'engine:8082'
          - 'embedder:8083'
  - job_name: 'nats'
    static_configs:
      - targets:
          - 'nats-exporter:7777'
